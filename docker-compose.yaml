networks:
  traefik_default:
    external: true

services:
  server:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    image: git.zarantonello.dev/university/notes:v2.11.0@sha256:5ce7c42c546eeafec120544ec32e0edf05a84700dee0755a130b7d1103f93c0a
    labels:
      traefik.enable: true
      traefik.http.routers.university-notes.entrypoints: cloudflare
      traefik.http.routers.university-notes.rule: Host(`ice-notes.zarantonello.dev`)
      traefik.http.services.university-notes.loadbalancer.server.port: 80
    networks:
      - traefik_default
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    user: 45383:45383
