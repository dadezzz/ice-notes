networks:
  traefik_default:
    external: true

services:
  server:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    image: git.zarantonello.dev/university/notes:v2.12.0@sha256:a919f855fae1b7aa09d424c59a410ae6d2b7681c31c716532cf201be037afd7a
    labels:
      traefik.enable: true
      traefik.http.routers.university-notes.entrypoints: cloudflare
      traefik.http.routers.university-notes.rule: Host(`ice-notes.zarantonello.dev`)
      traefik.http.services.university-notes.loadbalancer.server.port: 80
    networks:
      - traefik_default
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    user: 45383:45383
