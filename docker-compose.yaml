networks:
  traefik_default:
    external: true

services:
  server:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    image: git.zarantonello.dev/university/notes:v2.12.1@sha256:d78fef1b88d1ac304b59abf9ec1757c649f1a6fe77a9f26da5e9ad8b5859a6bf
    labels:
      traefik.enable: true
      traefik.http.routers.university-notes.entrypoints: cloudflare
      traefik.http.routers.university-notes.rule: Host(`ice-notes.zarantonello.dev`)
      traefik.http.services.university-notes.loadbalancer.server.port: 80
    networks:
      - traefik_default
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    user: 45383:45383
